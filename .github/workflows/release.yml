name: Build & Release

on:
  push:
    tags:
      - 'v*'         
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64

          - os: macos-13
            target: x86_64-apple-darwin
            label: macos-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      # ── Rust ──────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Linux system dependencies ─────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # ── Install UI deps ───────────────────────────────────────────────
      - name: Install UI dependencies
        run: npm --prefix ui install

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName:       ${{ github.ref_name }}
          releaseName:   'VitaPresence ${{ github.ref_name }}'
          releaseBody:   |
            ## VitaPresence ${{ github.ref_name }}

            Mostre seu jogo do PS Vita como Discord Rich Presence.

            ### Downloads
            | Plataforma | Arquivo |
            |---|---|
            | Linux (AppImage) | `VitaPresence_*.AppImage` |
            | Linux (Debian/Ubuntu) | `VitaPresence_*.deb` |
            | Linux (Fedora/RPM) | `VitaPresence_*.rpm` |
            | Windows | `VitaPresence_*_x64-setup.exe` |
            | macOS (Apple Silicon) | `VitaPresence_*_aarch64.dmg` |
            | macOS (Intel) | `VitaPresence_*_x64.dmg` |

            ### Instalação rápida
            Veja o [README](https://github.com/${{ github.repository }}#readme) para instruções completas.
          releaseDraft:    false
          prerelease:      false
          includeUpdaterJson: false
          args: --target ${{ matrix.target }}
