name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux_release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install root dependencies
        run: npm install

      - name: Install UI dependencies
        run: npm --prefix ui install

      - name: Build UI (production)
        run: npm --prefix ui run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VitaPresence ${{ github.ref_name }}"
          releaseBody: |
            ## VitaPresence ${{ github.ref_name }}

            ### Downloads
            |---|---|
            | 🐧 Linux AppImage | `VitaPresence_*.AppImage` |
            | 🪟 Windows Portable | `VitaPresence_*_x64.exe` |
          releaseDraft: false
          prerelease: false
          args: --target x86_64-unknown-linux-gnu --bundles appimage

  windows_portable:
    needs: linux_release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install root dependencies
        run: npm install

      - name: Install UI dependencies
        run: npm --prefix ui install

      - name: Build UI (production)
        run: npm --prefix ui run build

      - name: Build Windows portable exe
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --target x86_64-pc-windows-msvc

      - name: Prepare Windows artifact
        shell: pwsh
        run: Copy-Item "src-tauri/target/x86_64-pc-windows-msvc/release/vitapresence.exe" "VitaPresence_${{ github.ref_name }}_x64.exe"

      - name: Upload Windows portable exe
        uses: softprops/action-gh-release@v2
        with:
          files: VitaPresence_${{ github.ref_name }}_x64.exe
